<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <!-- 阶梯图标：3 级台阶，代表 stride（步伐）和渐进学习 -->
  <g transform="translate(8, 8)">
    <!-- 第一级台阶 -->
    <rect x="0" y="44" width="20" height="20" rx="3" fill="#D97757" opacity="0.4"/>
    <!-- 第二级台阶 -->
    <rect x="22" y="24" width="20" height="40" rx="3" fill="#D97757" opacity="0.7"/>
    <!-- 第三级台阶 -->
    <rect x="44" y="4" width="20" height="60" rx="3" fill="#D97757"/>
  </g>
  <!-- 文字 -->
  <text x="88" y="54" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#1A1A18" letter-spacing="-1">
    Stride<tspan fill="#D97757">28</tspan>
  </text>
</svg>
